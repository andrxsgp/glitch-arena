<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Center Turret</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; z-index: 10; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Kills: <span id="sCount">0</span> | HP: <span id="hpText">60</span>/60</p>
        <small style="color: #ff003c;">ALERTA: Núcleo hostil disparando ráfagas</small>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000, height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, virus, virusBullets, playerBullets, gfx;
        let playerHP = 60, kills = 0, lastVShot = 0, playerAmmo = 3, lastReload = 0;
        let healthBar, ammoBars = [];

        const rings = [
            { r: 160, gap: 0 }, { r: 330, gap: 90 }, { r: 500, gap: 180 }, { r: 700, gap: 270 }
        ];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            
            playerBullets = this.physics.add.group();
            virusBullets = this.physics.add.group();

            // Bit aparece lejos del centro
            player = this.add.rectangle(CX + 400, CY, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            
            // El Virus es la Torreta Central
            virus = this.add.triangle(CX, CY, 0, 40, 20, 0, 40, 40, 0xff003c).setDepth(5);
            this.physics.add.existing(virus);

            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(player, true, 0.1, 0.1);

            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);

            // Colisiones
            this.physics.add.overlap(playerBullets, virus, (v, b) => {
                b.destroy();
                kills++;
                document.getElementById('sCount').innerText = kills;
                // Pequeño efecto de explosión visual
                v.setTint(0xffffff);
                this.time.delayedCall(100, () => v.clearTint());
            });

            this.physics.add.overlap(player, virusBullets, (p, b) => {
                b.destroy();
                playerHP -= 10;
                if(playerHP <= 0) location.reload();
            });

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    playerBullets.add(b);
                    this.physics.moveTo(b, p.x, p.y, 700);
                    this.time.delayedCall(1500, () => { if(b.active) b.destroy(); });
                }
            });
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 38);
                let end = Phaser.Math.DegToRad(ring.gap + 322);
                gfx.beginPath(); gfx.arc(CX, CY, ring.r, start, end, false); gfx.strokePath();
            });

            // Movimiento Bit
            let cursors = this.input.keyboard.createCursorKeys();
            let wasd = this.input.keyboard.addKeys('W,A,S,D');
            player.body.setVelocity(0);
            if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-350);
            else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(350);
            if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-350);
            else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(350);

            // Virus dispara ráfagas cada 1.5 segundos
            if (time > lastVShot + 1500) {
                lastVShot = time;
                let vb = this.add.circle(virus.x, virus.y, 6, 0xff003c);
                virusBullets.add(vb);
                this.physics.moveToObject(vb, player, 250);
                this.time.delayedCall(3000, () => { if(vb.active) vb.destroy(); });
            }
            virus.rotation += 0.05; // El virus gira sobre sí mismo

            // Muros para Bit
            const d = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
            const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, player.x, player.y)));
            rings.forEach(r => {
                if (Math.abs(d - r.r) < 15) {
                    let diff = Math.abs(a - r.gap);
                    if (diff > 180) diff = 360 - diff;
                    if (diff > 35) {
                        const p = (d > r.r) ? 1 : -1;
                        const rad = Phaser.Math.DegToRad(a);
                        player.x = CX + Math.cos(rad) * (r.r + (24 * p));
                        player.y = CY + Math.sin(rad) * (r.r + (24 * p));
                    }
                }
            });

            // UI
            if (playerAmmo < 3 && time > lastReload + 1000) { playerAmmo++; lastReload = time; }
            document.getElementById('hpText').innerText = Math.floor(playerHP);
            healthBar.setPosition(player.x, player.y - 30).width = (playerHP/60)*40;
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 15 + (i*15), player.y - 22);
                ammoBars[i].visible = (i < playerAmmo);
            }
        }
    </script>
</body>
</html>
