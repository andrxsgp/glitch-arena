<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLITCH ARENA - Alpha 0.4</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #ff003c; box-shadow: 0 0 20px #ff003c; margin-top: 20px; }
        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #ff003c; font-size: 3rem; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        button { background: #ff003c; color: white; padding: 10px 20px; border: none; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <h1>[ GLITCH ARENA ]</h1>
    <div id="gameOverScreen" class="game-over-screen">
        <p>CONEXIÓN PERDIDA</p>
        <button onclick="window.location.reload()">REINTENTAR</button>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, wasd, cursors, balas, bloques, viruses;
        let healthBar, ammoBars = [];
        let playerHP = 100, playerAmmo = 3, lastReload = 0, virusCount = 0, gameOver = false;

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            this.cameras.main.setBounds(0, 0, 1600, 1200);

            // Grupos primero para que los objetos puedan referenciarlos
            balas = this.physics.add.group();
            bloques = this.physics.add.staticGroup();
            viruses = this.physics.add.group();

            // GENERACIÓN DE MUROS (Ajustados)
            const tileSize = 80;
            const wallSize = 60; // Un poco más pequeños que el tile para dejar pasillos claros
            for (let x = 0; x < 1600; x += tileSize) {
                for (let y = 0; y < 1200; y += tileSize) {
                    if (x < 200 && y < 200) continue;
                    if (Phaser.Math.Between(0, 10) > 7) { 
                        let visual = this.add.rectangle(x + 40, y + 40, wallSize, wallSize, 0x1a1a1a).setStrokeStyle(2, 0x00ff41);
                        visual.setDepth(1); // Muros en capa inferior
                        let b = bloques.create(x + 40, y + 40, null);
                        b.setSize(wallSize, wallSize).refreshBody(); // Hitbox exacta
                        b.setData('visual', visual);
                    }
                }
            }

            // Personaje: BIT (Depth alta para estar siempre ARRIBA)
            player = this.add.rectangle(100, 100, 30, 30, 0x00ff41);
            player.setDepth(10); 
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // UI
            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(11);
            for(let i=0; i<3; i++) { 
                ammoBars[i] = this.add.rectangle(0, 0, 10, 3, 0x00e5ff).setDepth(11); 
            }

            this.time.addEvent({ delay: 2500, callback: spawnVirus, callbackScope: this, loop: true });

            // FÍSICAS
            this.physics.add.collider(player, bloques);
            this.physics.add.collider(balas, bloques, (bala) => {
                if(bala.getData('rect')) bala.getData('rect').destroy();
                bala.destroy();
            });
            this.physics.add.collider(viruses, bloques);
            this.physics.add.collider(balas, viruses, (bala, virus) => {
                virus.getData('visual').destroy(); virus.destroy();
                bala.getData('rect').destroy(); bala.destroy();
                virusCount++;
            });
            this.physics.add.overlap(player, viruses, (p, v) => {
                playerHP -= 20;
                v.getData('visual').destroy(); v.destroy();
                if (playerHP <= 0 && !gameOver) endGame();
            });

            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys('W,A,S,D');

            this.input.on('pointerdown', (pointer) => {
                if (!gameOver && playerAmmo > 0) {
                    playerAmmo--;
                    let worldPoint = pointer.positionToCamera(this.cameras.main);
                    let balaRect = this.add.rectangle(player.x, player.y, 8, 8, 0x00e5ff).setDepth(5);
                    let bala = balas.create(player.x, player.y, null).setSize(8, 8);
                    bala.setData('rect', balaRect);
                    this.physics.moveTo(bala, worldPoint.x, worldPoint.y, 600);
                }
            });
        }

        function spawnVirus() {
            if (gameOver) return;
            let x = Phaser.Math.Between(800, 1500), y = Phaser.Math.Between(600, 1100);
            let vVis = this.add.rectangle(x, y, 25, 25, 0xff003c).setDepth(5);
            let v = viruses.create(x, y, null).setSize(25, 25);
            v.setData('visual', vVis);
        }

        function update(time) {
            if (gameOver) return;
            player.body.setVelocity(0);
            let speed = 280;
            if (cursors.left.isDown || wasd.A.isDown) player.body.setVelocityX(-speed);
            else if (cursors.right.isDown || wasd.D.isDown) player.body.setVelocityX(speed);
            if (cursors.up.isDown || wasd.W.isDown) player.body.setVelocityY(-speed);
            else if (cursors.down.isDown || wasd.S.isDown) player.body.setVelocityY(speed);

            if (playerAmmo < 3 && time > lastReload + 1200) { playerAmmo++; lastReload = time; }

            healthBar.x = player.x; healthBar.y = player.y - 35;
            healthBar.width = Math.max(0, (playerHP / 100) * 40);

            for(let i=0; i<3; i++) {
                ammoBars[i].x = (player.x - 14) + (i * 14);
                ammoBars[i].y = player.y - 25;
                ammoBars[i].visible = (i < playerAmmo);
            }

            balas.getChildren().forEach(b => {
                let r = b.getData('rect');
                if (r) { r.x = b.x; r.y = b.y; }
                if (Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) > 500) { if(r) r.destroy(); b.destroy(); }
            });

            viruses.getChildren().forEach(v => {
                this.physics.moveToObject(v, player, 130);
                let vis = v.getData('visual');
                if (vis) { vis.x = v.x; vis.y = v.y; }
            });
        }

        function endGame() {
            gameOver = true;
            this.physics.pause();
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
