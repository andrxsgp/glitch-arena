<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Triple Hit Virus</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; z-index: 10; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | HP: <span id="hpText">60</span>/60</p>
        <small style="color: #00e5ff;">INFO: Los virus requieren 3 disparos para ser eliminados</small>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000, height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, viruses, balas, pulseRing, gfx;
        let playerHP, kills, playerAmmo;
        let lastActionTime = 0, lastReload = 0, wasd, cursors, spaceKey;
        let healthBar, ammoBars = [];

        const rings = [
            { r: 160, gap: 0 }, { r: 330, gap: 90 }, { r: 500, gap: 180 }, { r: 700, gap: 270 }
        ];

        function preload() {}

        function create() {
            playerHP = 60;
            kills = 0;
            playerAmmo = 3;
            document.getElementById('sCount').innerText = "0";
            document.getElementById('hpText').innerText = "60";

            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            balas = this.physics.add.group();
            viruses = this.physics.add.group();

            player = this.add.rectangle(CX + 350, CY, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCircle(12);
            
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);

            // SISTEMA DE DAÑO A VIRUS (3 TOQUES)
            this.physics.add.overlap(balas, viruses, (b, v) => {
                b.destroy(); // La bala siempre se destruye
                
                v.hp -= 1; // Restar vida al virus
                v.setTint(0xffffff); // Feedback visual: parpadeo blanco
                this.time.delayedCall(100, () => { if(v.active) v.clearTint(); });

                if (v.hp <= 0) {
                    v.destroy();
                    kills = Math.min(5, kills + 1);
                    document.getElementById('sCount').innerText = kills;
                    this.time.delayedCall(1200, () => spawnVirus(this));
                }
            });

            this.physics.add.overlap(player, viruses, (p, v) => {
                if (playerHP > 0) {
                    playerHP -= 0.6; 
                    lastActionTime = this.time.now;
                    if(playerHP <= 0) {
                        playerHP = 0;
                        this.scene.restart();
                    }
                }
            });

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            cursors = this.input.keyboard.createCursorKeys();
            spaceKey = this.input.keyboard.addKey('SPACE');

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0 && playerHP > 0) {
                    playerAmmo--;
                    lastActionTime = this.time.now;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    balas.add(b);
                    this.physics.moveTo(b, p.x, p.y, 750);
                    this.time.delayedCall(500, () => { if(b.active) b.destroy(); });
                }
            });

            spawnVirus(this);
        }

        function spawnVirus(scene) {
            let v = scene.add.triangle(CX, CY, 0, 24, 12, 0, 24, 24, 0xff003c);
            v.setAlpha(0.7);
            scene.physics.add.existing(v);
            v.body.setCircle(12);
            
            // PROPIEDAD DE VIDA
            v.hp = 3; 
            
            viruses.add(v);
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 38);
                let end = Phaser.Math.DegToRad(ring.gap + 322);
                gfx.beginPath(); gfx.arc(CX, CY, ring.r, start, end, false); gfx.strokePath();
            });

            player.body.setVelocity(0);
            if (playerHP > 0) {
                if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-340);
                else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(340);
                if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-340);
                else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(340);
            }

            if (time - lastActionTime > 4000 && playerHP < 60 && playerHP > 0) {
                playerHP = Math.min(60, playerHP + 15);
                lastActionTime = time;
            }
            document.getElementById('hpText').innerText = Math.max(0, Math.floor(playerHP));

            viruses.getChildren().forEach(v => {
                this.physics.moveToObject(v, player, 190);
                v.rotation = Phaser.Math.Angle.Between(v.x, v.y, player.x, player.y) + Math.PI/2;
            });

            [player, ...balas.getChildren()].forEach(obj => {
                if(!obj || !obj.body) return;
                const d = Phaser.Math.Distance.Between(obj.x, obj.y, CX, CY);
                const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, obj.x, obj.y)));
                rings.forEach(r => {
                    if (Math.abs(d - r.r) < 15) {
                        let diff = Math.abs(a - r.gap);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 35) {
                            if (obj === player) {
                                const p = (d > r.r) ? 1 : -1;
                                const rad = Phaser.Math.DegToRad(a);
                                obj.x = CX + Math.cos(rad) * (r.r + (24 * p));
                                obj.y = CY + Math.sin(rad) * (r.r + (24 * p));
                            } else {
                                obj.destroy();
                            }
                        }
                    }
                });
            });

            if (playerAmmo < 3 && time > lastReload + 1000) { playerAmmo++; lastReload = time; }
            healthBar.setPosition(player.x, player.y - 30).width = (playerHP/60)*40;
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 15 + (i*15), player.y - 22);
                ammoBars[i].visible = (i < playerAmmo);
            }
        }
    </script>
</body>
</html>
