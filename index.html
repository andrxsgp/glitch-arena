<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Keyboard Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui { text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p>HP: <span id="shp">60</span> | Kills: <span id="sk">0</span> | [ESPACIO] para disparar</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO, width: 1000, height: 550,
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, virus, bullets = [], ammo = 3, lastFire = 0;
        let playerHP = 60, kills = 0, nextRegen = 0;
        const rings = [{r:160, g:0}, {r:330, g:90}, {r:500, g:180}];

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            
            player = this.add.rectangle(CX + 200, CY, 24, 24, 0x00ff41);
            this.physics.add.existing(player);
            
            // Pool de balas: creamos 10 y las escondemos
            for(let i=0; i<10; i++) {
                let b = this.add.circle(0, 0, 5, 0x00e5ff);
                this.physics.add.existing(b);
                b.setActive(false).setVisible(false);
                bullets.push(b);
            }

            spawnVirus(this);
            this.cameras.main.startFollow(player, true, 0.1, 0.1).setZoom(0.8);
            
            this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');
        }

        function spawnVirus(scene) {
            if (virus) { virus.x = CX; virus.y = CY - 200; virus.hp = 3; return; }
            virus = scene.add.triangle(CX, CY - 200, 0, 24, 12, 0, 24, 24, 0xff003c);
            scene.physics.add.existing(virus);
            virus.hp = 3;
        }

        function update(time) {
            // Movimiento Bit
            player.body.setVelocity(0);
            if (this.keys.A.isDown) player.body.setVelocityX(-350);
            else if (this.keys.D.isDown) player.body.setVelocityX(350);
            if (this.keys.W.isDown) player.body.setVelocityY(-350);
            else if (this.keys.S.isDown) player.body.setVelocityY(350);

            // Disparo con Espacio (Controlado por tiempo)
            if (this.keys.SPACE.isDown && time > lastFire + 250 && ammo > 0) {
                let b = bullets.find(bal => !bal.active);
                if (b) {
                    ammo--;
                    lastFire = time;
                    b.setActive(true).setVisible(true).setPosition(player.x, player.y);
                    // Dispara hacia donde mira el virus para simplificar
                    let ang = Phaser.Math.Angle.Between(player.x, player.y, virus.x, virus.y);
                    b.body.setVelocity(Math.cos(ang)*700, Math.sin(ang)*700);
                    this.time.delayedCall(800, () => { b.setActive(false).setVisible(false); b.body.setVelocity(0); });
                }
            }

            // Virus persigue
            if (virus) {
                let angV = Phaser.Math.Angle.Between(virus.x, virus.y, player.x, player.y);
                virus.body.setVelocity(Math.cos(angV)*170, Math.sin(angV)*170);
                
                // Colisión Bala-Virus MANUAL
                bullets.forEach(b => {
                    if (b.active && Phaser.Math.Distance.Between(b.x, b.y, virus.x, virus.y) < 30) {
                        b.setActive(false).setVisible(false);
                        virus.hp--;
                        if (virus.hp <= 0) {
                            kills++;
                            document.getElementById('sk').innerText = kills;
                            spawnVirus(this);
                        }
                    }
                });

                // Daño a Bit
                if (Phaser.Math.Distance.Between(player.x, player.y, virus.x, virus.y) < 25) {
                    playerHP -= 0.2;
                    document.getElementById('shp').innerText = Math.floor(playerHP);
                    if (playerHP <= 0) location.reload();
                }
            }

            // Recarga automática
            if (time > nextRegen) { if(ammo < 3) ammo++; nextRegen = time + 1000; }
        }
    </script>
</body>
</html>
