<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - True Smooth Arcs</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, wasd, cursors, viruses, graphics, pulseRing;
        let playerHP = 100, kills = 0;
        const CX = 800, CY = 600;
        
        // Definición de los anillos: Radio y ángulo de la "puerta" (en grados)
        const rings = [
            { r: 150, gap: 0 },
            { r: 320, gap: 90 },
            { r: 500, gap: 180 },
            { r: 700, gap: 270 }
        ];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.7);

            // Dibujar los Arcos Lisos
            graphics = this.add.graphics();
            graphics.lineStyle(6, 0x00ff41, 1);
            
            rings.forEach(ring => {
                // Dibujamos el arco dejando un espacio de 40 grados para la puerta
                let startAngle = Phaser.Math.DegToRad(ring.gap + 25);
                let endAngle = Phaser.Math.DegToRad(ring.gap + 335);
                graphics.beginPath();
                graphics.arc(CX, CY, ring.r, startAngle, endAngle, false);
                graphics.strokePath();
            });

            viruses = this.physics.add.group();
            player = this.add.rectangle(CX - 250, CY - 250, 20, 20, 0x00ff41);
            this.physics.add.existing(player);
            player.body.setCircle(10);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            spawnWave(this);

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            cursors = this.input.keyboard.createCursorKeys();
        }

        function handleArcCollision(entity) {
            const dist = Phaser.Math.Distance.Between(entity.x, entity.y, CX, CY);
            const angle = Phaser.Math.Angle.Between(CX, CY, entity.x, entity.y);
            const angleDeg = Phaser.Math.Wrap(Phaser.Math.RadToDeg(angle), 0, 360);

            rings.forEach(ring => {
                // Si la entidad está sobre el radio del anillo
                if (Math.abs(dist - ring.r) < 10) {
                    // Y NO está en el área de la puerta (margen de 30 grados)
                    let diff = Math.abs(angleDeg - ring.gap);
                    if (diff > 180) diff = 360 - diff;

                    if (diff > 25) {
                        // Empuje matemático hacia afuera o adentro para rebotar suavemente
                        const pushDir = (dist > ring.r) ? 1 : -1;
                        const angleRad = Phaser.Math.DegToRad(angleDeg);
                        entity.x = CX + Math.cos(angleRad) * (ring.r + (12 * pushDir));
                        entity.y = CY + Math.sin(angleRad) * (ring.r + (12 * pushDir));
                    }
                }
            });
        }

        function spawnWave(scene) {
            for(let i=0; i<3; i++) {
                let v = scene.add.triangle(0, 0, 0, 20, 10, 0, 20, 20, 0xff003c);
                scene.physics.add.existing(v);
                v.body.setCircle(10);
                v.setPosition(CX, CY);
                let ang = Math.random() * Math.PI * 2;
                v.body.setVelocity(Math.cos(ang) * 150, Math.sin(ang) * 150);
                viruses.add(v);
            }
        }

        function update() {
            player.body.setVelocity(0);
            if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-300);
            else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(300);
            if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-300);
            else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(300);

            // Aplicar colisión de arco liso a todos
            handleArcCollision(player);
            viruses.getChildren().forEach(v => {
                handleArcCollision(v);
                
                // IA de seguimiento simple
                let angle = Phaser.Math.Angle.Between(v.x, v.y, player.x, player.y);
                v.body.setVelocity(Math.cos(angle) * 140, Math.sin(angle) * 140);
                v.rotation = angle + Math.PI/2;
            });
        }
    </script>
</body>
</html>
