<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Full System</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #020205; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-ui { font-family: 'Courier New', monospace; text-align: center; position: absolute; top: 10px; width: 100%; z-index: 100; pointer-events: none; display: none; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h1 style="margin:0; color:#00ff41; text-shadow: 0 0 10px #00ff41;">[ CORE ARENA ]</h1>
        <p style="color:#00e5ff; font-weight: bold;">BIT_HP: <span id="hpText">60</span>% | <span id="super-hint" style="color:#ff00ff; display:none; text-shadow: 0 0 10px #ff00ff;">!! SÚPER CARGADO [ESPACIO] !!</span></p>
    </div>

    <script>
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const { width, height } = this.scale;
                this.add.text(width/2, height/2 - 50, 'CORE ARENA', { fontSize: '80px', color: '#00ff41', fontFamily: 'Courier New', fontWeight: 'bold' }).setOrigin(0.5);
                let btn = this.add.rectangle(width/2, height/2 + 50, 300, 60, 0x00ff41, 0.1).setStrokeStyle(2, 0x00ff41).setInteractive({useHandCursor:true});
                this.add.text(width/2, height/2 + 50, 'INICIAR SISTEMA', { fontSize: '24px', color: '#00ff41', fontFamily: 'Courier New' }).setOrigin(0.5);
                btn.on('pointerdown', () => {
                    document.getElementById('game-ui').style.display = 'block';
                    this.scene.start('GameScene');
                });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            create() {
                // Reset de variables
                this.playerHP = 60; this.virusHP = 50; this.ammo = 3; this.superCharge = 0;
                this.gameEnded = false; this.pBullets = []; this.vBullets = [];
                this.nextAmmo = 0; this.lastVShot = 0;
                this.CX = 800; this.CY = 600;
                this.rings = [{ r: 180, g: 0 }, { r: 350, g: 90 }, { r: 520, g: 180 }];

                this.physics.world.setBounds(0, 0, 1600, 1200);
                this.gfx = this.add.graphics();
                this.add.grid(800, 600, 2400, 2400, 64, 64, 0x00e5ff, 0.05).setDepth(-1);

                // Bit y Barras
                this.player = this.add.rectangle(this.CX + 400, this.CY, 24, 24, 0x00ff41).setDepth(10);
                this.physics.add.existing(this.player);
                this.pHealthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
                this.pSuperBar = this.add.rectangle(0, 0, 40, 3, 0xff00ff).setDepth(20);
                this.ammoBars = [];
                for(let i=0; i<3; i++) this.ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);

                // Virus
                this.virus = this.add.triangle(this.CX, this.CY, 0, 80, 40, 0, 80, 80, 0xff003c).setDepth(5);
                this.vHealthBar = this.add.rectangle(this.CX, this.CY - 100, 100, 10, 0xff003c).setDepth(6);

                this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(this.player, true, 0.1, 0.1);
                this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');
                this.input.on('pointerdown', (p) => this.shoot(p));
                
                document.getElementById('hpText').innerText = "60";
                document.getElementById('super-hint').style.display = 'none';
            }

            update(time) {
                if (this.gameEnded) return;

                this.drawGlitchWalls();

                // Movimiento
                let cursors = this.input.keyboard.createCursorKeys();
                this.player.body.setVelocity(0);
                if (this.keys.A.isDown || cursors.left.isDown) this.player.body.setVelocityX(-400);
                else if (this.keys.D.isDown || cursors.right.isDown) this.player.body.setVelocityX(400);
                if (this.keys.W.isDown || cursors.up.isDown) this.player.body.setVelocityY(-400);
                else if (this.keys.S.isDown || cursors.down.isDown) this.player.body.setVelocityY(400);

                // Colisiones Muros
                let d = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.CX, this.CY);
                let ang = Phaser.Math.Angle.Between(this.CX, this.CY, this.player.x, this.player.y);
                let deg = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(ang));
                this.rings.forEach(r => {
                    if (Math.abs(d - r.r) < 20) {
                        let diff = Math.abs(deg - r.g);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 40) {
                            let push = (d > r.r) ? r.r + 21 : r.r - 21;
                            this.player.x = this.CX + Math.cos(ang) * push;
                            this.player.y = this.CY + Math.sin(ang) * push;
                        }
                    }
                });

                // Súper Ataque
                if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE) && this.superCharge >= 10) this.lanzarSuper();

                // Recarga
                if (time > this.nextAmmo && this.ammo < 3) { this.ammo++; this.nextAmmo = time + 1000; }

                // IA Virus
                if (this.virus.active && time > this.lastVShot + 1200) {
                    this.lastVShot = time;
                    let vb = this.add.circle(this.CX, this.CY, 10, 0xff003c).setStrokeStyle(2, 0xffffff);
                    let a = Phaser.Math.Angle.Between(this.CX, this.CY, this.player.x, this.player.y);
                    vb.vx = Math.cos(a) * 8; vb.vy = Math.sin(a) * 8;
                    this.vBullets.push(vb);
                }

                // Balas Jugador
                this.pBullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    if (this.virus.active && Phaser.Math.Distance.Between(b.x, b.y, this.CX, this.CY) < 50) {
                        this.showDmg(this.CX, this.CY, "-1", "#00e5ff", "30px");
                        b.destroy(); this.pBullets.splice(i, 1);
                        this.virusHP--;
                        this.vHealthBar.width = (this.virusHP / 50) * 100;
                        if (this.superCharge < 10) { 
                            this.superCharge++; 
                            if(this.superCharge >= 10) document.getElementById('super-hint').style.display = 'inline';
                        }
                        if (this.virusHP <= 0) this.win();
                    }
                });

                // Balas Virus
                this.vBullets.forEach((vb, i) => {
                    vb.x += vb.vx; vb.y += vb.vy;
                    if (Phaser.Math.Distance.Between(vb.x, vb.y, this.player.x, this.player.y) < 25) {
                        this.showDmg(this.player.x, this.player.y, "-10", "#ff003c", "40px");
                        this.playerHP -= 10;
                        document.getElementById('hpText').innerText = this.playerHP;
                        vb.destroy(); this.vBullets.splice(i, 1);
                        this.cameras.main.shake(150, 0.01);
                        if (this.playerHP <= 0) this.lose();
                    }
                });

                // Update Barras
                this.pHealthBar.setPosition(this.player.x, this.player.y - 35).width = (this.playerHP/60)*40;
                this.pSuperBar.setPosition(this.player.x, this.player.y - 30).width = (this.superCharge/10)*40;
                this.ammoBars.forEach((ab, i) => {
                    ab.setPosition(this.player.x - 15 + (i * 15), this.player.y - 25);
                    ab.visible = (i < this.ammo);
                });
            }

            drawGlitchWalls() {
                this.gfx.clear();
                this.rings.forEach(r => {
                    this.gfx.lineStyle(25, 0x00e5ff, 0.1); 
                    this.gfx.beginPath();
                    this.gfx.arc(this.CX, this.CY, r.r, Phaser.Math.DegToRad(r.g + 45), Phaser.Math.DegToRad(r.g + 315));
                    this.gfx.strokePath();

                    this.gfx.lineStyle(15, 0x00e5ff, 0.8); 
                    this.gfx.beginPath();
                    this.gfx.arc(this.CX, this.CY, r.r, Phaser.Math.DegToRad(r.g + 40), Phaser.Math.DegToRad(r.g + 320));
                    this.gfx.strokePath();

                    if (Math.random() > 0.85) {
                        this.gfx.lineStyle(4, 0xffffff, 0.6);
                        this.gfx.beginPath();
                        this.gfx.arc(this.CX, this.CY, r.r + (Math.random()*8-4), Phaser.Math.DegToRad(r.g + 40), Phaser.Math.DegToRad(r.g + 320));
                        this.gfx.strokePath();
                    }
                });
            }

            shoot(p) {
                if (this.ammo > 0 && !this.gameEnded) {
                    this.ammo--;
                    let pWorld = p.positionToCamera(this.cameras.main);
                    let b = this.add.circle(this.player.x, this.player.y, 6, 0x00e5ff).setStrokeStyle(2, 0xffffff);
                    let a = Phaser.Math.Angle.Between(this.player.x, this.player.y, pWorld.x, pWorld.y);
                    b.vx = Math.cos(a) * 20; b.vy = Math.sin(a) * 20;
                    this.pBullets.push(b);
                }
            }

            showDmg(x, y, txt, col, size) {
                let t = this.add.text(x, y - 40, txt, { fontFamily: 'Arial Black', fontSize: size, color: col }).setOrigin(0.5);
                this.tweens.add({ targets: t, y: y - 120, alpha: 0, duration: 800, onComplete: () => t.destroy() });
            }

            lanzarSuper() {
                this.superCharge = 0; document.getElementById('super-hint').style.display = 'none';
                let o = this.add.circle(this.player.x, this.player.y, 10, 0xff00ff, 0.4).setDepth(1);
                this.vBullets.forEach(v => v.destroy()); this.vBullets = [];
                if (Phaser.Math.Distance.Between(this.player.x, this.player.y, this.CX, this.CY) < 600) {
                    this.virusHP -= 8;
                    this.vHealthBar.width = Math.max(0, (this.virusHP / 50) * 100);
                    this.showDmg(this.CX, this.CY, "-8", "#ff00ff", "70px");
                    if (this.virusHP <= 0) this.win();
                }
                this.tweens.add({ targets: o, radius: 600, alpha: 0, duration: 600, onComplete: () => o.destroy() });
            }

            win() {
                this.gameEnded = true;
                for(let i=0; i<30; i++) {
                    let p = this.add.rectangle(this.CX, this.CY, 15, 15, 0xff003c);
                    this.physics.add.existing(p);
                    p.body.setVelocity(Phaser.Math.Between(-600, 600), Phaser.Math.Between(-600, 600));
                    this.tweens.add({ targets: p, alpha: 0, scale: 0, duration: 1500, onComplete: () => p.destroy() });
                }
                this.virus.destroy(); this.vHealthBar.destroy();
                this.add.text(this.CX, this.CY, 'SISTEMA PURGADO', { fontSize: '60px', color: '#00ff41', fontFamily: 'Courier New' }).setOrigin(0.5);
                this.time.delayedCall(3000, () => { document.getElementById('game-ui').style.display = 'none'; this.scene.start('MenuScene'); });
            }

            lose() {
                this.gameEnded = true;
                this.cameras.main.shake(600, 0.05);
                this.time.addEvent({
                    delay: 40, repeat: 20,
                    callback: () => {
                        this.player.x += Phaser.Math.Between(-30, 30);
                        this.player.fillColor = (Math.random() > 0.5) ? 0xffffff : 0xff003c;
                        this.player.scaleX = Math.random() * 5;
                    }
                });
                this.time.delayedCall(1500, () => { document.getElementById('game-ui').style.display = 'none'; this.scene.start('MenuScene'); });
            }
        }

        const config = { type: Phaser.AUTO, width: 1000, height: 550, physics: { default: 'arcade' }, scene: [MenuScene, GameScene] };
        new Phaser.Game(config);
    </script>
</body>
</html>
