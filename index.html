<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Fixed Navigation AI</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; z-index: 10; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | HP: <span id="hpText">60</span>/60</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000, height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, viruses, balas, pulseRing, gfx;
        let playerHP = 60, playerAmmo = 3, kills = 0;
        let lastActionTime = 0, lastReload = 0, wasd, cursors, spaceKey;
        let healthBar, ammoBars = [];

        const rings = [
            { r: 160, gap: 0 }, { r: 330, gap: 90 }, { r: 500, gap: 180 }, { r: 700, gap: 270 }
        ];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            balas = this.physics.add.group();
            viruses = this.physics.add.group();

            player = this.add.rectangle(CX + 350, CY + 50, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCircle(12);
            
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);
            pulseRing = this.add.circle(0, 0, 10, 0x00e5ff, 0.3).setVisible(false).setDepth(5);

            this.physics.add.overlap(balas, viruses, (b, v) => {
                b.destroy(); v.destroy();
                kills = Math.min(5, kills + 1);
                document.getElementById('sCount').innerText = kills;
                this.time.delayedCall(1500, () => spawnVirus(this));
            });

            this.physics.add.overlap(player, viruses, (p, v) => {
                playerHP -= 0.5; 
                lastActionTime = this.time.now;
                if(playerHP <= 0) this.scene.restart();
            });

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            cursors = this.input.keyboard.createCursorKeys();
            spaceKey = this.input.keyboard.addKey('SPACE');

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    lastActionTime = this.time.now;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    balas.add(b);
                    this.physics.moveTo(b, p.x, p.y, 750);
                    this.time.delayedCall(500, () => { if(b.active) b.destroy(); });
                }
            });

            spawnVirus(this);
        }

        function spawnVirus(scene) {
            let v = scene.add.triangle(CX, CY, 0, 24, 12, 0, 24, 24, 0xff003c);
            scene.physics.add.existing(v);
            v.body.setCircle(12);
            v.targetGate = null; // Memoria de navegación
            viruses.add(v);
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 35);
                let end = Phaser.Math.DegToRad(ring.gap + 325);
                gfx.beginPath(); gfx.arc(CX, CY, ring.r, start, end, false); gfx.strokePath();
            });

            player.body.setVelocity(0);
            const pSpeed = 340;
            if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-pSpeed);
            else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(pSpeed);
            if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-pSpeed);
            else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(pSpeed);

            if (time - lastActionTime > 4000 && playerHP < 60) {
                playerHP = Math.min(60, playerHP + 15);
                lastActionTime = time;
            }
            document.getElementById('hpText').innerText = Math.floor(playerHP);

            // IA VIRUS MEJORADA (MEMORIA Y NAVEGACIÓN)
            viruses.getChildren().forEach(v => {
                const distV = Phaser.Math.Distance.Between(v.x, v.y, CX, CY);
                const distP = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
                
                let vRing = rings.findIndex(r => Math.abs(distV - r.r) < 50);
                let pRing = rings.findIndex(r => Math.abs(distP - r.r) < 50);

                let moveX = player.x;
                let moveY = player.y;

                // Si hay un muro de por medio (distintos anillos)
                if (vRing !== -1 && vRing !== pRing) {
                    let gapAngle = Phaser.Math.DegToRad(rings[vRing].gap);
                    moveX = CX + Math.cos(gapAngle) * rings[vRing].r;
                    moveY = CY + Math.sin(gapAngle) * rings[vRing].r;
                    
                    // Si ya está muy cerca de la puerta, puede empezar a mirar al siguiente objetivo
                    if(Phaser.Math.Distance.Between(v.x, v.y, moveX, moveY) < 30) {
                        moveX = player.x;
                        moveY = player.y;
                    }
                }

                this.physics.moveTo(v, moveX, moveY, 240);
                v.rotation = Phaser.Math.Angle.Between(v.x, v.y, moveX, moveY) + Math.PI/2;
            });

            // FÍSICA DE MUROS CON REBOTE
            [player, ...viruses.getChildren()].forEach(obj => {
                if(!obj || !obj.body) return;
                const d = Phaser.Math.Distance.Between(obj.x, obj.y, CX, CY);
                const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, obj.x, obj.y)));
                rings.forEach(r => {
                    if (Math.abs(d - r.r) < 18) {
                        let diff = Math.abs(a - r.gap);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 32) {
                            const push = (d > r.r) ? 22 : -22;
                            const angleRad = Phaser.Math.DegToRad(a);
                            obj.x = CX + Math.cos(angleRad) * (r.r + push);
                            obj.y = CY + Math.sin(angleRad) * (r.r + push);
                            // Detener velocidad frontal para evitar que se pegue
                            if(obj === player) {
                                obj.body.velocity.x *= 0.5;
                                obj.body.velocity.y *= 0.5;
                            }
                        }
                    }
                });
            });

            // Balas
            balas.getChildren().forEach(b => {
                const d = Phaser.Math.Distance.Between(b.x, b.y, CX, CY);
                const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, b.x, b.y)));
                rings.forEach(r => {
                    if (Math.abs(d - r.r) < 12) {
                        let diff = Math.abs(a - r.gap);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 30) b.destroy();
                    }
                });
            });

            if (playerAmmo < 3 && time > lastReload + 1000) { playerAmmo++; lastReload = time; }
            healthBar.setPosition(player.x, player.y - 30).width = (playerHP/60)*40;
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 15 + (i*15), player.y - 22);
                ammoBars[i].visible = (i < playerAmmo);
            }
        }
    </script>
</body>
</html>
