<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin: 10px; }
    </style>
</head>
<body>
    <div style="text-align: center; color: #00ff41;">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p>HP: <span id="hp">60</span> | Kills: <span id="kk">0</span></p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO, width: 900, height: 500,
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, virus, gfx, cursors, keys;
        let bullets = [];
        let hp = 60, score = 0, ammo = 3, nextAmmo = 0;
        const CX = 450, CY = 250;
        const rings = [{r:100, g:0}, {r:180, g:90}, {r:260, g:180}];

        function create() {
            gfx = this.add.graphics();
            player = this.add.rectangle(CX+120, CY, 20, 20, 0x00ff41);
            this.physics.add.existing(player);
            
            // Creamos un solo virus para empezar y evitar saturación
            spawnVirus(this);

            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,S,D');

            this.input.on('pointerdown', (pointer) => {
                if (ammo > 0) {
                    ammo--;
                    let b = this.add.circle(player.x, player.y, 4, 0x00e5ff);
                    this.physics.add.existing(b);
                    // Disparo directo
                    let angle = Phaser.Math.Angle.Between(player.x, player.y, pointer.x, pointer.y);
                    b.body.setVelocity(Math.cos(angle)*600, Math.sin(angle)*600);
                    bullets.push(b);
                }
            });
        }

        function spawnVirus(scene) {
            if (virus) virus.destroy();
            virus = scene.add.triangle(CX, CY-150, 0, 20, 10, 0, 20, 20, 0xff003c);
            scene.physics.add.existing(virus);
            virus.hp = 3;
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(4, 0x00ff41);
            rings.forEach(r => {
                gfx.beginPath();
                gfx.arc(CX, CY, r.r, Phaser.Math.DegToRad(r.g+40), Phaser.Math.DegToRad(r.g+320));
                gfx.strokePath();
            });

            // Movimiento Bit
            player.body.setVelocity(0);
            if (keys.A.isDown || cursors.left.isDown) player.body.setVelocityX(-300);
            if (keys.D.isDown || cursors.right.isDown) player.body.setVelocityX(300);
            if (keys.W.isDown || cursors.up.isDown) player.body.setVelocityY(-300);
            if (keys.S.isDown || cursors.down.isDown) player.body.setVelocityY(300);

            // Muros para Bit
            let distP = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
            let angP = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, player.x, player.y)));
            rings.forEach(r => {
                if (Math.abs(distP - r.r) < 10) {
                    let diff = Math.abs(angP - r.g);
                    if (diff > 180) diff = 360 - diff;
                    if (diff > 30) {
                        let push = (distP > r.r) ? 2 : -2;
                        let rad = Phaser.Math.DegToRad(angP);
                        player.x = CX + Math.cos(rad) * (r.r + (12 * push));
                        player.y = CY + Math.sin(rad) * (r.r + (12 * push));
                    }
                }
            });

            // IA Virus (Atraviesa todo)
            if (virus && virus.active) {
                let angV = Phaser.Math.Angle.Between(virus.x, virus.y, player.x, player.y);
                virus.body.setVelocity(Math.cos(angV)*160, Math.sin(angV)*160);
                virus.rotation = angV + Math.PI/2;

                // Daño a Bit
                if (Phaser.Math.Distance.Between(player.x, player.y, virus.x, virus.y) < 20) {
                    hp -= 0.5;
                    document.getElementById('hp').innerText = Math.floor(hp);
                    if (hp <= 0) { hp=60; score=0; this.scene.restart(); }
                }
            }

            // Lógica de Balas Manual (Ultra-segura)
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                if (!b.active) { bullets.splice(i, 1); continue; }

                // ¿Le dio al virus?
                if (virus && virus.active && Phaser.Math.Distance.Between(b.x, b.y, virus.x, virus.y) < 25) {
                    virus.hp--;
                    b.destroy();
                    bullets.splice(i, 1);
                    virus.setTint(0xffffff);
                    this.time.delayedCall(100, () => { if(virus) virus.clearTint(); });

                    if (virus.hp <= 0) {
                        score++;
                        document.getElementById('kk').innerText = score;
                        spawnVirus(this);
                    }
                    continue;
                }

                // Borrar si sale de pantalla
                if (b.x < 0 || b.x > 900 || b.y < 0 || b.y > 500) {
                    b.destroy();
                    bullets.splice(i, 1);
                }
            }

            // Recarga
            if (time > nextAmmo && ammo < 3) { ammo++; nextAmmo = time + 1000; }
        }
    </script>
</body>
</html>
