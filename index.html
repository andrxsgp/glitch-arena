<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLITCH ARENA - Prototipo</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #ff003c; box-shadow: 0 0 20px #ff003c; margin-top: 20px; }
        .ui { margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>[ GLITCH ARENA: PRUEBA DE CAMPO ]</h1>
        <p>Usa las FLECHAS del teclado para mover al personaje "BIT"</p>
    </div>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player;
        let cursors;

        function preload() {
            // Aquí cargaríamos imágenes. Por ahora usaremos un cuadrado generado.
        }

        function create() {
            // Creamos a "BIT" (un cuadrado verde neón)
            player = this.add.rectangle(400, 225, 40, 40, 0x00ff41);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            player.body.setVelocity(0);

            if (cursors.left.isDown) player.body.setVelocityX(-200);
            else if (cursors.right.isDown) player.body.setVelocityX(200);

            if (cursors.up.isDown) player.body.setVelocityY(-200);
            else if (cursors.down.isDown) player.body.setVelocityY(200);
        }
    </script>
</body>
</html>
