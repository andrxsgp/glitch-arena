<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLITCH ARENA - Alpha 0.3</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #ff003c; box-shadow: 0 0 20px #ff003c; margin-top: 20px; }
        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #ff003c; font-size: 3rem; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        button { background: #ff003c; color: white; padding: 10px 20px; border: none; cursor: pointer; font-family: monospace; }
    </style>
</head>
<body>
    <h1>[ GLITCH ARENA ]</h1>
    <p>Virus eliminados: <span id="virusEliminados">0</span></p>

    <div id="gameOverScreen" class="game-over-screen">
        <p>SISTEMA CRÍTICO: OFFLINE</p>
        <button onclick="window.location.reload()">REINICIAR NÚCLEO</button>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, wasd, cursors, balas, bloques, viruses;
        let healthBar, ammoBars = [];
        let playerHP = 100, playerAmmo = 3, lastReload = 0, virusCount = 0, gameOver = false;

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 900);
            this.cameras.main.setBounds(0, 0, 1600, 900);

            // Personaje: BIT
            player = this.add.rectangle(800, 450, 30, 30, 0x00ff41);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // UI que SIGUE al jugador (Sin setScrollFactor(0))
            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00);
            for(let i=0; i<3; i++) { ammoBars[i] = this.add.rectangle(0, 0, 10, 3, 0x00e5ff); }

            // Grupos
            balas = this.physics.add.group();
            bloques = this.physics.add.staticGroup();
            viruses = this.physics.add.group();

            // Generar Bloques "Electrificados"
            for (let i = 0; i < 40; i++) {
                let x = Phaser.Math.Between(100, 1500);
                let y = Phaser.Math.Between(100, 800);
                if (Phaser.Math.Distance.Between(x, y, 800, 450) < 100) continue; // No bloques cerca del spawn
                let visual = this.add.rectangle(x, y, 40, 40, 0x1a1a1a).setStrokeStyle(2, 0x00ff41);
                let b = bloques.create(x, y, null).setSize(40, 40).refreshBody();
                b.setData('visual', visual);
            }

            // Spawn de Virus cada 2 seg
            this.time.addEvent({ delay: 2000, callback: spawnVirus, callbackScope: this, loop: true });

            // Colisiones
            this.physics.add.collider(player, bloques, () => {
                playerHP -= 0.2; // Daño constante al tocar bloques
                player.setFillStyle(0xffa500);
            });
            
            this.physics.add.collider(balas, bloques, (bala, bloque) => {
                bloque.getData('visual').destroy(); bloque.destroy();
                bala.getData('rect').destroy(); bala.destroy();
            });

            this.physics.add.collider(balas, viruses, (bala, virus) => {
                virus.getData('visual').destroy(); virus.destroy();
                bala.getData('rect').destroy(); bala.destroy();
                virusCount++; document.getElementById('virusEliminados').innerText = virusCount;
            });

            this.physics.add.overlap(player, viruses, (p, v) => {
                playerHP -= 15;
                v.getData('visual').destroy(); v.destroy();
                if (playerHP <= 0 && !gameOver) endGame();
            });

            cursors = this.input.keyboard.createCursorKeys();
            wasd = this.input.keyboard.addKeys('W,A,S,D');

            this.input.on('pointerdown', (pointer) => {
                if (!gameOver && playerAmmo > 0) {
                    playerAmmo--;
                    let worldPoint = pointer.positionToCamera(this.cameras.main);
                    let balaRect = this.add.rectangle(player.x, player.y, 10, 10, 0x00e5ff);
                    let bala = balas.create(player.x, player.y, null).setSize(10, 10);
                    bala.setData('rect', balaRect);
                    this.physics.moveTo(bala, worldPoint.x, worldPoint.y, 600);
                }
            });
        }

        function spawnVirus() {
            if (gameOver) return;
            let x = Phaser.Math.Between(0, 1600);
            let y = Phaser.Math.Between(0, 900);
            if (Phaser.Math.Distance.Between(x, y, player.x, player.y) < 300) return;
            let vVis = this.add.rectangle(x, y, 25, 25, 0xff003c);
            let v = viruses.create(x, y, null).setSize(25, 25);
            v.setData('visual', vVis);
        }

        function update(time) {
            if (gameOver) return;
            player.body.setVelocity(0);
            player.setFillStyle(0x00ff41); // Reset color

            if (cursors.left.isDown || wasd.A.isDown) player.body.setVelocityX(-300);
            else if (cursors.right.isDown || wasd.D.isDown) player.body.setVelocityX(300);
            if (cursors.up.isDown || wasd.W.isDown) player.body.setVelocityY(-300);
            else if (cursors.down.isDown || wasd.S.isDown) player.body.setVelocityY(300);

            if (playerAmmo < 3 && time > lastReload + 1200) { playerAmmo++; lastReload = time; }

            // POSICIONAR UI SOBRE EL JUGADOR
            healthBar.x = player.x; healthBar.y = player.y - 35;
            healthBar.width = Math.max(0, (playerHP / 100) * 40);
            healthBar.fillColor = (playerHP > 30) ? 0x00ff00 : 0xff0000;

            for(let i=0; i<3; i++) {
                ammoBars[i].x = (player.x - 14) + (i * 14);
                ammoBars[i].y = player.y - 25;
                ammoBars[i].visible = (i < playerAmmo);
            }

            balas.getChildren().forEach(b => {
                let r = b.getData('rect');
                if (r) { r.x = b.x; r.y = b.y; }
                if (Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) > 600) { r.destroy(); b.destroy(); }
            });

            viruses.getChildren().forEach(v => {
                this.physics.moveToObject(v, player, 120);
                let vis = v.getData('visual');
                if (vis) { vis.x = v.x; vis.y = v.y; }
            });
        }

        function endGame() {
            gameOver = true;
            game.scene.scenes[0].physics.pause();
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
    </script>
</body>
</html>
