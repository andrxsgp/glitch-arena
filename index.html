<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Fixed Mechanics</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 30px #00e5ff; }
        #game-ui { text-align: center; padding: 10px; pointer-events: none; position: absolute; top: 10px; width: 100%; z-index: 100; display: none; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h1 style="margin:0; color:#00ff41;">[ CORE ARENA ]</h1>
        <p style="color:#00e5ff;">BIT HP: <span id="hpText">60</span> | <span id="super-hint" style="color:#ff00ff; display:none; font-weight:bold;">¡SÚPER CARGADO!</span></p>
    </div>

    <script>
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const { width, height } = this.scale;
                this.gfx = this.add.graphics();
                this.title = this.add.text(width/2, height/2 - 80, 'CORE ARENA', {
                    fontFamily: 'Courier New', fontSize: '80px', fontWeight: 'bold', color: '#00ff41'
                }).setOrigin(0.5);

                let btn = this.add.rectangle(width/2, height/2 + 80, 280, 60, 0x00ff41, 0.1).setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0x00ff41);
                let txt = this.add.text(width/2, height/2 + 80, 'INICIAR SISTEMA', { fontFamily: 'Courier New', fontSize: '24px', color: '#00ff41' }).setOrigin(0.5);

                btn.on('pointerdown', () => {
                    this.cameras.main.shake(800, 0.04);
                    this.time.addEvent({
                        delay: 40, repeat: 20,
                        callback: () => {
                            this.gfx.clear();
                            for(let i=0; i<10; i++) {
                                this.gfx.fillStyle(0x00ff41, 0.7);
                                this.gfx.fillRect(0, Math.random()*550, 1000, Math.random()*50);
                            }
                        }
                    });
                    this.time.delayedCall(900, () => {
                        document.getElementById('game-ui').style.display = 'block';
                        this.scene.start('GameScene');
                    });
                });
            }
        }

        class GameScene extends Phaser.Scene {
            constructor() { super('GameScene'); }

            create() {
                // Inicialización de variables de estado
                this.playerHP = 60;
                this.virusHP = 50;
                this.superCharge = 0;
                this.ammo = 3;
                this.lastVShot = 0;
                this.nextAmmoTime = 0;
                this.gameEnded = false;
                this.pBullets = [];
                this.vBullets = [];
                
                this.CX = 800; this.CY = 600;
                this.rings = [{ r: 160, g: 0 }, { r: 330, g: 90 }, { r: 500, g: 180 }];

                this.physics.world.setBounds(0, 0, 1600, 1200);
                this.gfx = this.add.graphics();
                this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');

                this.player = this.add.rectangle(this.CX + 350, this.CY, 24, 24, 0x00ff41).setDepth(10);
                this.physics.add.existing(this.player);

                this.pHealthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
                this.superBar = this.add.rectangle(0, 0, 40, 3, 0xff00ff).setDepth(20);
                this.ammoBars = [];
                for(let i=0; i<3; i++) this.ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);

                this.virus = this.add.triangle(this.CX, this.CY, 0, 60, 30, 0, 60, 60, 0xff003c).setDepth(5);
                this.vHealthBar = this.add.rectangle(this.CX, this.CY - 50, 60, 8, 0xff0000).setDepth(5);

                this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(this.player, true, 0.1, 0.1);
                
                document.getElementById('hpText').innerText = this.playerHP;
                document.getElementById('super-hint').style.display = 'none';

                this.input.on('pointerdown', (p) => this.shoot(p));
            }

            shoot(pointer) {
                if (this.ammo > 0 && !this.gameEnded) {
                    this.ammo--;
                    let pWorld = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(this.player.x, this.player.y, 5, 0x00e5ff);
                    let ang = Phaser.Math.Angle.Between(this.player.x, this.player.y, pWorld.x, pWorld.y);
                    b.vx = Math.cos(ang) * 18; b.vy = Math.sin(ang) * 18;
                    this.pBullets.push(b);
                }
            }

            update(time, delta) {
                if (this.gameEnded) return;

                // Dibujar Anillos
                this.gfx.clear(); 
                this.gfx.lineStyle(6, 0x00ff41);
                this.rings.forEach(r => {
                    this.gfx.beginPath();
                    this.gfx.arc(this.CX, this.CY, r.r, Phaser.Math.DegToRad(r.g + 40), Phaser.Math.DegToRad(r.g + 320));
                    this.gfx.strokePath();
                });

                // Movimiento
                let cursors = this.input.keyboard.createCursorKeys();
                this.player.body.setVelocity(0);
                if (this.keys.A.isDown || cursors.left.isDown) this.player.body.setVelocityX(-350);
                else if (this.keys.D.isDown || cursors.right.isDown) this.player.body.setVelocityX(350);
                if (this.keys.W.isDown || cursors.up.isDown) this.player.body.setVelocityY(-350);
                else if (this.keys.S.isDown || cursors.down.isDown) this.player.body.setVelocityY(350);

                // Colisiones con paredes
                let d = Phaser.Math.Distance.Between(this.player.x, this.player.y, this.CX, this.CY);
                let ang = Phaser.Math.Angle.Between(this.CX, this.CY, this.player.x, this.player.y);
                let deg = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(ang));

                this.rings.forEach(r => {
                    if (Math.abs(d - r.r) < 12) {
                        let diff = Math.abs(deg - r.g);
                        if (diff > 180) diff = 360 - diff;
                        if (diff > 38) {
                            let tr = (d > r.r) ? r.r + 13 : r.r - 13;
                            this.player.x = this.CX + Math.cos(ang) * tr;
                            this.player.y = this.CY + Math.sin(ang) * tr;
                        }
                    }
                });

                // Recarga de Munición (REPARADO)
                if (time > this.nextAmmoTime && this.ammo < 3) {
                    this.ammo++;
                    this.nextAmmoTime = time + 1000;
                }

                // Súper
                if (Phaser.Input.Keyboard.JustDown(this.keys.SPACE) && this.superCharge >= 10) this.lanzarSuper();

                // Disparo del Virus (REPARADO)
                if (this.virus.active && time > this.lastVShot + 1200) {
                    this.lastVShot = time;
                    let vb = this.add.circle(this.CX, this.CY, 8, 0xff003c);
                    let a = Phaser.Math.Angle.Between(this.CX, this.CY, this.player.x, this.player.y);
                    vb.vx = Math.cos(a) * 8; vb.vy = Math.sin(a) * 8;
                    this.vBullets.push(vb);
                }

                // Procesar Balas Jugador
                this.pBullets.forEach((b, i) => {
                    b.x += b.vx; b.y += b.vy;
                    if (this.virus.active && Phaser.Math.Distance.Between(b.x, b.y, this.CX, this.CY) < 40) {
                        b.destroy(); this.pBullets.splice(i, 1);
                        this.virusHP--;
                        this.showDmg(this.CX, this.CY, "-1", "#00e5ff", '35px');
                        this.vHealthBar.width = (this.virusHP / 50) * 60;
                        if (this.superCharge < 10) { 
                            this.superCharge++; 
                            if(this.superCharge >= 10) document.getElementById('super-hint').style.display = 'inline'; 
                        }
                        if (this.virusHP <= 0) this.win();
                    }
                });

                // Procesar Balas Virus
                this.vBullets.forEach((vb, j) => {
                    vb.x += vb.vx; vb.y += vb.vy;
                    if (Phaser.Math.Distance.Between(vb.x, vb.y, this.player.x, this.player.y) < 22) {
                        this.playerHP -= 10;
                        this.showDmg(this.player.x, this.player.y, "-10", "#ff003c", '45px');
                        document.getElementById('hpText').innerText = Math.floor(this.playerHP);
                        vb.destroy(); this.vBullets.splice(j, 1);
                        if (this.playerHP <= 0) this.lose();
                    }
                });

                // Actualizar barras UI
                this.pHealthBar.setPosition(this.player.x, this.player.y - 30).width = (this.playerHP/60)*40;
                this.superBar.setPosition(this.player.x, this.player.y - 25).width = (this.superCharge/10)*40;
                this.ammoBars.forEach((ab, i) => { 
                    ab.setPosition(this.player.x-15+(i*15), this.player.y-18); 
                    ab.visible = (i < this.ammo); 
                });
            }

            showDmg(x, y, txt, col, size) {
                let t = this.add.text(x, y - 40, txt, { fontFamily: 'Arial Black', fontSize: size, color: col }).setOrigin(0.5);
                this.tweens.add({ targets: t, y: y - 120, alpha: 0, duration: 1000, onComplete: () => t.destroy() });
            }

            lanzarSuper() {
                this.superCharge = 0; 
                document.getElementById('super-hint').style.display = 'none';
                let o = this.add.circle(this.player.x, this.player.y, 10, 0xff00ff, 0.4).setDepth(1);
                if (Phaser.Math.Distance.Between(this.player.x, this.player.y, this.CX, this.CY) < 600) {
                    this.virusHP -= 5;
                    this.showDmg(this.CX, this.CY, "-5", "#ff00ff", '80px');
                    this.vHealthBar.width = Math.max(0, (this.virusHP / 50) * 60);
                    if (this.virusHP <= 0) this.win();
                }
                this.vBullets.forEach(v => v.destroy()); this.vBullets = [];
                this.tweens.add({ targets: o, radius: 600, alpha: 0, duration: 600, onComplete: () => o.destroy() });
            }

            win() {
                this.gameEnded = true;
                for(let i=0; i<25; i++) {
                    let p = this.add.rectangle(this.CX, this.CY, 12, 12, 0xff003c);
                    this.physics.add.existing(p);
                    p.body.setVelocity(Phaser.Math.Between(-500, 500), Phaser.Math.Between(-500, 500));
                    this.tweens.add({ targets: p, alpha: 0, scale: 0, duration: 1500, onComplete: () => p.destroy() });
                }
                this.virus.destroy(); 
                this.add.text(this.CX, this.CY, 'SISTEMA PURGADO', { fontSize: '60px', color: '#00ff41', fontFamily: 'Courier New' }).setOrigin(0.5);
                this.time.delayedCall(2500, () => this.backToMenu());
            }

            lose() {
                this.gameEnded = true;
                this.cameras.main.shake(600, 0.05);
                this.time.addEvent({
                    delay: 40, repeat: 15,
                    callback: () => {
                        this.player.x += Phaser.Math.Between(-25, 25);
                        this.player.fillColor = (Math.random() > 0.5) ? 0xffffff : 0xff003c;
                        this.player.scaleX = Math.random() * 4;
                    }
                });
                this.time.delayedCall(1200, () => this.backToMenu());
            }

            backToMenu() {
                document.getElementById('game-ui').style.display = 'none';
                this.scene.start('MenuScene');
            }
        }

        const config = { type: Phaser.AUTO, width: 1000, height: 550, physics: { default: 'arcade' }, scene: [MenuScene, GameScene] };
        new Phaser.Game(config);
    </script>
</body>
</html>
