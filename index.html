<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE LABYRINTH - Full Combat</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; margin-top: 10px; }
        #superReady { color: #00e5ff; font-weight: bold; visibility: hidden; text-shadow: 0 0 8px #00e5ff; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | <span id="superReady">¡SÚPER LISTO!</span></p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000,
            height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, wasd, cursors, spaceKey, viruses, balas, pulseRing;
        let playerHP = 100, playerAmmo = 3, kills = 0, lastReload = 0;
        let lastActionTime = 0, superReady = false, healthBar, ammoBars = [];
        let isInvulnerable = false;

        const rings = [
            { r: 160, gap: 0 },    { r: 330, gap: 90 },
            { r: 500, gap: 180 },  { r: 700, gap: 270 }
        ];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.7);

            // Dibujar Arcos
            const gfx = this.add.graphics();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 30);
                let end = Phaser.Math.DegToRad(ring.gap + 330);
                gfx.beginPath();
                gfx.arc(CX, CY, ring.r, start, end, false);
                gfx.strokePath();
            });

            balas = this.physics.add.group();
            viruses = this.physics.add.group();

            // Bit
            player = this.add.rectangle(CX - 250, CY - 250, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCircle(12);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // UI
            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(11);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(11);
            pulseRing = this.add.circle(0, 0, 10, 0x00e5ff, 0.3).setVisible(false).setDepth(1);

            // Colisión Proyectil vs Virus
            this.physics.add.overlap(balas, viruses, (b, v) => {
                v.setData('hp', v.getData('hp') - 20);
                v.setFillStyle(0xffffff);
                this.time.delayedCall(50, () => v.active && v.setFillStyle(0xff003c));
                if(v.getData('hp') <= 0) { 
                    v.destroy(); 
                    updateKills(); 
                    if(viruses.countActive() === 0) spawnWave(this); 
                }
                b.destroy();
            });

            // Colisión Bit vs Virus
            this.physics.add.overlap(player, viruses, (p, v) => {
                if(!isInvulnerable) {
                    playerHP -= 20;
                    isInvulnerable = true;
                    lastActionTime = this.time.now;
                    p.setAlpha(0.5);
                    this.time.delayedCall(1000, () => { isInvulnerable = false; p.setAlpha(1); });
                    if(playerHP <= 0) location.reload();
                }
            });

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            cursors = this.input.keyboard.createCursorKeys();
            spaceKey = this.input.keyboard.addKey('SPACE');

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    lastActionTime = this.time.now;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    balas.add(b);
                    this.physics.moveTo(b, p.x, p.y, 600);
                    this.time.delayedCall(1000, () => b.destroy());
                }
            });

            spawnWave(this);
        }

        function handleArcPhysics(obj, isVirus = false) {
            const dist = Phaser.Math.Distance.Between(obj.x, obj.y, CX, CY);
            const angle = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, obj.x, obj.y)));
            
            rings.forEach(ring => {
                if (Math.abs(dist - ring.r) < 12) {
                    let diff = Math.abs(angle - ring.gap);
                    if (diff > 180) diff = 360 - diff;
                    
                    if (diff > 28) { // Bloqueo si no es la puerta
                        const pushOut = (dist > ring.r) ? 1 : -1;
                        const angRad = Phaser.Math.DegToRad(angle);
                        obj.x = CX + Math.cos(angRad) * (ring.r + (15 * pushOut));
                        obj.y = CY + Math.sin(angRad) * (ring.r + (15 * pushOut));
                        if(isVirus) obj.setData('blocked', true);
                    } else {
                        if(isVirus) obj.setData('blocked', false);
                    }
                }
            });
        }

        function spawnWave(scene) {
            for(let i=0; i<3; i++) {
                let v = scene.add.triangle(CX, CY, 0, 24, 12, 0, 24, 24, 0xff003c);
                scene.physics.add.existing(v);
                v.body.setCircle(12);
                v.setData('hp', 60);
                viruses.add(v);
            }
        }

        function updateKills() {
            if(!superReady) {
                kills++;
                document.getElementById('sCount').innerText = kills;
                if(kills >= 5) { superReady = true; document.getElementById('superReady').style.visibility = 'visible'; }
            }
        }

        function update(time) {
            player.body.setVelocity(0);
            if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-320);
            else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(320);
            if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-320);
            else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(320);

            // Habilidad Súper
            if (Phaser.Input.Keyboard.JustDown(spaceKey) && superReady) {
                superReady = false; kills = 0;
                document.getElementById('sCount').innerText = "0";
                document.getElementById('superReady').style.visibility = 'hidden';
                pulseRing.setPosition(player.x, player.y).setVisible(true).setRadius(10).setAlpha(0.6);
                this.tweens.add({ targets: pulseRing, radius: 250, alpha: 0, duration: 400, onComplete: () => pulseRing.setVisible(false) });
                viruses.getChildren().forEach(v => {
                    if(Phaser.Math.Distance.Between(player.x, player.y, v.x, v.y) < 250) v.destroy();
                });
            }

            // Recarga y UI
            if (playerAmmo < 3 && time > lastReload + 1200) { playerAmmo++; lastReload = time; }
            if (time - lastActionTime > 4000 && playerHP < 100) playerHP = Math.min(100, playerHP + 0.5);
            
            healthBar.setPosition(player.x, player.y - 30).width = (playerHP/100)*40;
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 15 + (i*15), player.y - 22);
                ammoBars[i].visible = (i < playerAmmo);
            }

            handleArcPhysics(player);

            viruses.getChildren().forEach(v => {
                handleArcPhysics(v, true);
                
                let angleToPlayer = Phaser.Math.Angle.Between(v.x, v.y, player.x, player.y);
                
                // Si el virus está bloqueado por un muro, busca la puerta
                if(v.getData('blocked')) {
                    const distV = Phaser.Math.Distance.Between(v.x, v.y, CX, CY);
                    const currentRing = rings.find(r => Math.abs(distV - r.r) < 40);
                    if(currentRing) {
                        let angleToGap = Phaser.Math.DegToRad(currentRing.gap);
                        angleToPlayer = angleToGap; // Se desvía hacia la puerta
                    }
                }
                
                v.body.setVelocity(Math.cos(angleToPlayer)*150, Math.sin(angleToPlayer)*150);
                v.rotation = angleToPlayer + Math.PI/2;
            });
        }
    </script>
</body>
</html>
