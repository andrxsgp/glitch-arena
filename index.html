<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Ultra Stable</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; z-index: 10; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | HP: <span id="hpText">60</span>/60</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000, height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, viruses, balas, gfx;
        let playerHP = 60, kills = 0, playerAmmo = 3;
        let lastActionTime = 0, lastReload = 0, wasd, cursors;
        const rings = [{ r: 160, gap: 0 }, { r: 330, gap: 90 }, { r: 500, gap: 180 }, { r: 700, gap: 270 }];

        function preload() {}

        function create() {
            // Reiniciar estado
            playerHP = 60; kills = 0; playerAmmo = 3;
            
            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            balas = this.physics.add.group();
            viruses = this.physics.add.group();

            player = this.add.rectangle(CX + 350, CY, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCircle(12);
            
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(player, true, 0.1, 0.1);

            // COLISIÓN BALA -> VIRUS (SISTEMA SIMPLIFICADO)
            this.physics.add.overlap(balas, viruses, (bala, virus) => {
                if (!bala.active || !virus.active) return;

                bala.destroy(); // Eliminar bala
                
                let vHP = virus.getData('hp') - 1;
                virus.setData('hp', vHP);
                virus.setTint(0xffffff);
                this.time.delayedCall(100, () => { if(virus.active) virus.clearTint(); });

                if (vHP <= 0) {
                    virus.destroy();
                    kills = Math.min(5, kills + 1);
                    document.getElementById('sCount').innerText = kills;
                    this.time.delayedCall(1000, () => spawnVirus(this));
                }
            });

            // DAÑO AL JUGADOR
            this.physics.add.overlap(player, viruses, (p, v) => {
                playerHP -= 0.3;
                lastActionTime = this.time.now;
                document.getElementById('hpText').innerText = Math.max(0, Math.floor(playerHP));
                if(playerHP <= 0) this.scene.restart();
            });

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            cursors = this.input.keyboard.createCursorKeys();

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    balas.add(b);
                    this.physics.moveTo(b, p.x, p.y, 700);
                    this.time.delayedCall(1000, () => { if(b.active) b.destroy(); });
                }
            });

            spawnVirus(this);
        }

        function spawnVirus(scene) {
            let v = scene.add.triangle(CX, CY, 0, 24, 12, 0, 24, 24, 0xff003c);
            v.setAlpha(0.7);
            scene.physics.add.existing(v);
            v.body.setCircle(12);
            v.setData('hp', 3); // Usar el sistema de datos oficial de Phaser
            viruses.add(v);
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 38);
                let end = Phaser.Math.DegToRad(ring.gap + 322);
                gfx.beginPath(); gfx.arc(CX, CY, ring.r, start, end, false); gfx.strokePath();
            });

            // Movimiento Bit
            player.body.setVelocity(0);
            const s = 340;
            if (wasd.A.isDown || cursors.left.isDown) player.body.setVelocityX(-s);
            else if (wasd.D.isDown || cursors.right.isDown) player.body.setVelocityX(s);
            if (wasd.W.isDown || cursors.up.isDown) player.body.setVelocityY(-s);
            else if (wasd.S.isDown || cursors.down.isDown) player.body.setVelocityY(s);

            // Movimiento Virus (Simplificado al máximo)
            viruses.getChildren().forEach(v => {
                let angle = Phaser.Math.Angle.Between(v.x, v.y, player.x, player.y);
                v.body.setVelocity(Math.cos(angle) * 170, Math.sin(angle) * 170);
                v.rotation = angle + Math.PI/2;
            });

            // Colisión Muros (Solo para el jugador)
            const d = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
            const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, player.x, player.y)));
            rings.forEach(r => {
                if (Math.abs(d - r.r) < 15) {
                    let diff = Math.abs(a - r.gap);
                    if (diff > 180) diff = 360 - diff;
                    if (diff > 35) {
                        const p = (d > r.r) ? 25 : -25;
                        const rad = Phaser.Math.DegToRad(a);
                        player.x = CX + Math.cos(rad) * (r.r + p);
                        player.y = CY + Math.sin(rad) * (r.r + p);
                    }
                }
            });

            // Recarga munición
            if (playerAmmo < 3 && time > lastReload + 1000) { playerAmmo++; lastReload = time; }
            if (time - lastActionTime > 4000 && playerHP < 60) { playerHP = Math.min(60, playerHP + 0.1); }
        }
    </script>
</body>
</html>
