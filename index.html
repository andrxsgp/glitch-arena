<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Stable Epic Version</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #020205; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-ui { font-family: 'Courier New', monospace; text-align: center; position: absolute; top: 10px; width: 100%; z-index: 100; pointer-events: none; display: none; }
    </style>
</head>
<body>
    <div id="game-ui">
        <h1 style="margin:0; color:#00ff41; text-shadow: 0 0 15px #00ff41;">[ CORE ARENA ]</h1>
        <p style="color:#00e5ff; font-weight: bold; font-size: 1.2em;">BIT_INTEGRITY: <span id="hpText">60</span>% | <span id="super-hint" style="color:#ff00ff; display:none; text-shadow: 0 0 20px #ff00ff;">> SINGULARITY_READY [SPACE] <</span></p>
    </div>

    <script>
        class MenuScene extends Phaser.Scene {
            constructor() { super('MenuScene'); }
            create() {
                const { width, height } = this.scale;
                this.gfx = this.add.graphics().setDepth(10);
                this.add.text(width/2, height/2 - 60, 'CORE ARENA', { fontSize: '90px', color: '#00ff41', fontFamily: 'Courier New', fontStyle: 'bold' }).setOrigin(0.5).setShadow(0, 0, '#00ff41', 20);
                let btn = this.add.rectangle(width/2, height/2 + 60, 350, 70, 0x00ff41, 0.1).setStrokeStyle(3, 0x00ff41).setInteractive({useHandCursor:true});
                let btnText = this.add.text(width/2, height/2 + 60, 'INITIALIZE_SYSTEM', { fontSize: '26px', color: '#00ff41', fontFamily: 'Courier New', fontStyle: 'bold' }).setOrigin(0.5);
                
                btn.on('pointerdown', () => {
                    btn.setVisible(false); btnText.setVisible(false);
                    this.cameras.main.shake(800, 0.04);
                    this.time.addEvent({
                        delay: 40, repeat: 20,
                        callback: () => {
                            this.gfx.clear();
                            for(let i=0; i<20; i++) {
                                this.gfx.fillStyle([0x00ff41, 0xffffff, 0xff003c, 0x00e5ff][Math.floor(Math.random()*4)], 0.7);
                                this.gfx.fillRect(0, Math.random()*height, width, Math.random()*100);
                            }
                        }
                    });
                    this.time.delayedCall(1000, () => {
                        document.getElementById('game-ui').style.display = 'block';
                        this.scene.start('GameScene');
                    });
                });
            }
        }

        class GameScene extends Phaser.Scene {

            create() {
                // Generación de texturas segura (verifica que no existan antes de crearlas)
                if (!this.textures.exists('cyan_bit')) {

                    g.fillStyle(0x00e5ff); g.fillRect(0,0,8,8); g.generateTexture('cyan_bit', 8, 8);
                    g.clear(); g.fillStyle(0xff003c); g.fillRect(0,0,12,12); g.generateTexture('red_bit', 12, 12);
                    g.clear(); g.fillStyle(0x00ff41); g.fillRect(0,0,10,10); g.generateTexture('green_bit', 10, 10);
                    g.destroy();

                // Reinicio de UI
                document.getElementById('hpText').innerText = "60";
                document.getElementById('super-hint').style.display = 'none';

                this.gfxWalls = this.add.graphics();

                this.gameEnded = false; this.pBullets = []; this.vBullets = [];
                this.nextAmmo = 0; this.lastVShot = 0;

                // BIT
                this.player = this.add.rectangle(this.CX + 500, this.CY, 24, 24, 0x00ff41).setDepth(10);
                this.playerAura = this.add.circle(this.CX + 500, this.CY, 35, 0x00ff41, 0.2).setDepth(9);
                this.physics.add.existing(this.player);
                
                this.pHealthBar = this.add.rectangle(0, 0, 50, 6, 0x00ff00).setDepth(20);
                this.pSuperBar = this.add.rectangle(0, 0, 50, 4, 0xff00ff).setDepth(20);

                // VIRUS
                this.virus = this.add.triangle(this.CX, this.CY, 0, 100, 50, 0, 100, 100, 0xff003c).setDepth(5);
                this.vAura = this.add.circle(this.CX, this.CY, 70, 0xff003c, 0.2).setDepth(4);
                this.vHealthBar = this.add.rectangle(this.CX, this.CY - 130, 150, 12, 0xff003c).setDepth(6);

                this.cameras.main.setBounds(0, 0, 2400, 1800).setZoom(0.8).startFollow(this.player, true, 0.08, 0.08);
                this.keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');
                this.input.on('pointerdown', (p) => this.fireGlitchBolt(p));
            }
