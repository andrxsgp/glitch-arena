<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - DEBUG MODE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #debug-log { position: absolute; top: 10px; left: 10px; font-size: 12px; color: red; z-index: 1000; pointer-events: none; }
        canvas { border: 2px solid #00ff41; box-shadow: 0 0 20px #00ff41; }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    <div id="ui" style="position:fixed; top:20px; width:100%; text-align:center; z-index:10; display:none; pointer-events:none;">
        <h2 id="stats">BIT: 100% | VIRUS: 100%</h2>
    </div>

    <script>
        // Sistema de captura de errores para decirte QUÉ pasa exactamente
        window.onerror = function(msg, url, line) {
            document.getElementById('debug-log').innerHTML += `<p>ERROR: ${msg} (Línea: ${line})</p>`;
        };

        const config = {
            type: Phaser.CANVAS, // Forzamos modo básico para máxima compatibilidad
            width: 800,
            height: 600,
            backgroundColor: '#020205',
            parent: document.body,
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        let game;
        try {
            game = new Phaser.Game(config);
        } catch(e) {
            document.getElementById('debug-log').innerHTML = "Fallo crítico al iniciar Phaser: " + e.message;
        }

        let player, virus, cursors, bullets, vBullets, spaceBar;
        let pHP = 100, vHP = 100, superCharge = 0;

        function preload() {
            // No cargamos imágenes externas para evitar bloqueos de seguridad (CORS)
        }

        function create() {
            document.getElementById('ui').style.display = 'block';
            
            // Creamos al jugador (BIT)
            player = this.add.rectangle(600, 300, 30, 30, 0x00ff41);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);

            // Creamos al Jefe (VIRUS)
            virus = this.add.triangle(150, 300, 0, 100, 50, 0, 100, 100, 0xff003c);
            this.physics.add.existing(virus);
            virus.body.setImmovable(true);

            // Grupos de disparos
            bullets = this.physics.add.group();
            vBullets = this.physics.add.group();

            // Controles
            cursors = this.input.keyboard.createCursorKeys();
            spaceBar = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

            // Colisiones: Bala de Bit golpea al Virus
            this.physics.add.overlap(bullets, virus, (v, b) => {
                b.destroy();
                vHP -= 2;
                superCharge = Math.min(100, superCharge + 5);
                updateUI();
                
                // Efecto visual de golpe (Flash blanco)
                this.cameras.main.shake(100, 0.01);
                if(vHP <= 0) alert("SISTEMA PURGADO");
            });

            // Colisiones: Bala de Virus golpea a Bit
            this.physics.add.overlap(vBullets, player, (p, b) => {
                b.destroy();
                pHP -= 10;
                updateUI();
                this.cameras.main.shake(200, 0.03);
                if(pHP <= 0) { alert("KERNEL PANIC - GAME OVER"); location.reload(); }
            });

            // Disparo automático del Virus cada 1.5 segundos
            this.time.addEvent({
                delay: 1500,
                callback: virusShoot,
                callbackScope: this,
                loop: true
            });
        }

        function update() {
            // Movimiento
            player.body.setVelocity(0);
            if (cursors.left.isDown) player.body.setVelocityX(-350);
            if (cursors.right.isDown) player.body.setVelocityX(350);
            if (cursors.up.isDown) player.body.setVelocityY(-350);
            if (cursors.down.isDown) player.body.setVelocityY(350);

            // Disparar con click
            if (this.input.activePointer.isDown && this.time.now > (this.lastFired || 0)) {
                shoot.call(this);
                this.lastFired = this.time.now + 300;
            }

            // Super Ataque
            if (Phaser.Input.Keyboard.JustDown(spaceBar) && superCharge >= 100) {
                useSuper.call(this);
            }
        }

        function shoot() {
            let b = this.add.rectangle(player.x, player.y, 20, 10, 0x00e5ff);
            this.physics.add.existing(b);
            // El ataque ahora es un "Glitch Bolt" (va rotando y vibra)
            b.body.setVelocityX(-600);
            this.tweens.add({
                targets: b,
                angle: 360,
                duration: 500,
                repeat: -1
            });
            bullets.add(b);
        }

        function virusShoot() {
            let b = this.add.circle(virus.x, virus.y, 10, 0xff003c);
            this.physics.add.existing(b);
            this.physics.moveToObject(b, player, 300);
            vBullets.add(b);
        }

        function useSuper() {
            superCharge = 0;
            updateUI();
            this.cameras.main.flash(500, 255, 255, 255);
            vHP -= 20;
            updateUI();
        }

        function updateUI() {
            let s = superCharge >= 100 ? "!! SUPER LISTO [ESPACIO] !!" : "";
            document.getElementById('stats').innerText = `BIT: ${pHP}% | VIRUS: ${vHP}% ${s}`;
        }
    </script>
</body>
</html>
