<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Manual Collision Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; box-shadow: 0 0 20px #00e5ff; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; z-index: 10; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | HP: <span id="hpText">60</span>/60</p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 1000, height: 550,
            backgroundColor: '#050505',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, viruses, balas, gfx;
        let playerHP = 60, kills = 0, playerAmmo = 3, lastReload = 0;
        const rings = [{ r: 160, gap: 0 }, { r: 330, gap: 90 }, { r: 500, gap: 180 }, { r: 700, gap: 270 }];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            balas = this.add.group(); // Grupo normal, no de física, para control total
            viruses = this.physics.add.group();

            player = this.add.rectangle(CX + 350, CY, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCircle(12);
            
            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(player, true, 0.1, 0.1);

            // Único overlap: Virus contra Jugador (que sí funciona)
            this.physics.add.overlap(player, viruses, () => {
                playerHP -= 0.2;
                document.getElementById('hpText').innerText = Math.max(0, Math.floor(playerHP));
                if(playerHP <= 0) location.reload(); // Reinicio total del navegador para limpiar memoria
            });

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    this.physics.add.existing(b);
                    balas.add(b);
                    this.physics.moveTo(b, p.x, p.y, 800);
                }
            });

            spawnVirus(this);
        }

        function spawnVirus(scene) {
            let v = scene.add.triangle(CX, CY, 0, 24, 12, 0, 24, 24, 0xff003c);
            scene.physics.add.existing(v);
            v.body.setCircle(12);
            v.hp = 3;
            v.setAlpha(0.7);
            viruses.add(v);
        }

        function update(time) {
            gfx.clear();
            gfx.lineStyle(6, 0x00ff41, 1);
            rings.forEach(ring => {
                let start = Phaser.Math.DegToRad(ring.gap + 38);
                let end = Phaser.Math.DegToRad(ring.gap + 322);
                gfx.beginPath(); gfx.arc(CX, CY, ring.r, start, end, false); gfx.strokePath();
            });

            // Movimiento Bit
            player.body.setVelocity(0);
            let cursors = this.input.keyboard.createCursorKeys();
            let keys = this.input.keyboard.addKeys('W,A,S,D');
            if (keys.A.isDown || cursors.left.isDown) player.body.setVelocityX(-350);
            else if (keys.D.isDown || cursors.right.isDown) player.body.setVelocityX(350);
            if (keys.W.isDown || cursors.up.isDown) player.body.setVelocityY(-350);
            else if (keys.S.isDown || cursors.down.isDown) player.body.setVelocityY(350);

            // LÓGICA MANUAL DE IMPACTO (SIN OVERLAPS DE MOTOR)
            balas.getChildren().forEach(b => {
                viruses.getChildren().forEach(v => {
                    let dist = Phaser.Math.Distance.Between(b.x, b.y, v.x, v.y);
                    if (dist < 25) { // Si hay choque
                        b.destroy(); // Borrar bala inmediatamente
                        v.hp--;
                        v.setTint(0xffffff);
                        this.time.delayedCall(100, () => { if(v.active) v.clearTint(); });
                        
                        if(v.hp <= 0) {
                            v.destroy();
                            kills++;
                            document.getElementById('sCount').innerText = kills;
                            this.time.delayedCall(1000, () => spawnVirus(this));
                        }
                    }
                });
                // Limpieza automática de balas lejanas
                if (Phaser.Math.Distance.Between(b.x, b.y, player.x, player.y) > 1000) b.destroy();
            });

            // Movimiento Virus
            viruses.getChildren().forEach(v => {
                let angle = Phaser.Math.Angle.Between(v.x, v.y, player.x, player.y);
                v.body.setVelocity(Math.cos(angle) * 175, Math.sin(angle) * 175);
                v.rotation = angle + Math.PI/2;
            });

            // Muros (Solo Bit)
            const d = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
            const a = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, player.x, player.y)));
            rings.forEach(r => {
                if (Math.abs(d - r.r) < 15) {
                    let diff = Math.abs(a - r.gap);
                    if (diff > 180) diff = 360 - diff;
                    if (diff > 35) {
                        const p = (d > r.r) ? 26 : -26;
                        const rad = Phaser.Math.DegToRad(a);
                        player.x = CX + Math.cos(rad) * (r.r + p);
                        player.y = CY + Math.sin(rad) * (r.r + p);
                    }
                }
            });

            if (playerAmmo < 3 && time > lastReload + 1000) { playerAmmo++; lastReload = time; }
        }
    </script>
</body>
</html>
