<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CORE ARENA - Epic Damage</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #00e5ff; margin-top: 10px; box-shadow: 0 0 30px #ff00ff; }
        .ui { text-align: center; padding: 10px; pointer-events: none; position: absolute; top: 10px; width: 100%; z-index: 100; }
        #super-hint { color: #ff00ff; font-weight: bold; display: none; text-shadow: 0 0 20px #ff00ff; font-size: 28px; }
    </style>
</head>
<body>
    <div class="ui">
        <h1 style="margin:0;">[ CORE ARENA ]</h1>
        <p>BIT HP: <span id="hpText">60</span> | <span id="super-hint">¡SÚPER CARGADO! [ESPACIO]</span></p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO, width: 1000, height: 550,
            physics: { default: 'arcade' },
            scene: { create: create, update: update }
        };

        const game = new Phaser.Game(config);
        const CX = 800, CY = 600;
        let player, virus, gfx, vHealthBar, vHealthBG, pHealthBar, superBar;
        let pBullets = [], vBullets = [], ammoBars = [];
        let playerHP = 60, virusHP = 50, ammo = 3, nextAmmo = 0, lastVShot = 0;
        let superCharge = 0, gameEnded = false, keys;
        
        const rings = [{ r: 160, g: 0 }, { r: 330, g: 90 }, { r: 500, g: 180 }];

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            gfx = this.add.graphics();
            keys = this.input.keyboard.addKeys('W,A,S,D,SPACE');
            
            player = this.add.rectangle(CX + 350, CY, 24, 24, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            
            pHealthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(20);
            superBar = this.add.rectangle(0, 0, 40, 3, 0xff00ff).setDepth(20);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 4, 0x00e5ff).setDepth(20);

            virus = this.add.triangle(CX, CY, 0, 60, 30, 0, 60, 60, 0xff003c).setDepth(5);
            vHealthBG = this.add.rectangle(CX, CY - 50, 60, 8, 0x330000).setDepth(4);
            vHealthBar = this.add.rectangle(CX, CY - 50, 60, 8, 0xff0000).setDepth(5);

            this.cameras.main.setBounds(0, 0, 1600, 1200).setZoom(0.8).startFollow(player, true, 0.1, 0.1);

            this.input.on('pointerdown', (pointer) => {
                if (ammo > 0 && !gameEnded) {
                    ammo--;
                    let pWorld = pointer.positionToCamera(this.cameras.main);
                    let b = this.add.circle(player.x, player.y, 5, 0x00e5ff);
                    let ang = Phaser.Math.Angle.Between(player.x, player.y, pWorld.x, pWorld.y);
                    b.vx = Math.cos(ang) * 18; b.vy = Math.sin(ang) * 18;
                    pBullets.push(b);
                }
            });
        }

        // TEXTO DE DAÑO ÉPICO
        function showDamage(scene, x, y, amount, color, isSuper = false) {
            let fontSize = isSuper ? '80px' : '40px'; 
            let duration = isSuper ? 1500 : 800; // Dura más si es Súper

            let txt = scene.add.text(x, y - 50, amount, { 
                fontFamily: 'Arial Black', 
                fontSize: fontSize, 
                color: color,
                stroke: '#ffffff',
                strokeThickness: isSuper ? 4 : 2,
                shadow: { offsetX: 0, offsetY: 0, color: color, blur: 15, fill: true }
            }).setOrigin(0.5).setDepth(100);

            // Animación de subida lenta y desaparición
            scene.tweens.add({
                targets: txt,
                y: y - 150,
                alpha: 0,
                scale: isSuper ? 1.2 : 1,
                duration: duration,
                ease: 'Cubic.out',
                onComplete: () => txt.destroy()
            });

            // Si es súper, que vibre la pantalla más tiempo
            if(isSuper) scene.cameras.main.shake(300, 0.04);
        }

        function update(time) {
            if (gameEnded) return;

            gfx.clear();
            gfx.lineStyle(6, 0x00ff41);
            rings.forEach(r => {
                gfx.beginPath();
                gfx.arc(CX, CY, r.r, Phaser.Math.DegToRad(r.g + 40), Phaser.Math.DegToRad(r.g + 320));
                gfx.strokePath();
            });

            let cursors = this.input.keyboard.createCursorKeys();
            player.body.setVelocity(0);
            if (keys.A.isDown || cursors.left.isDown) player.body.setVelocityX(-350);
            else if (keys.D.isDown || cursors.right.isDown) player.body.setVelocityX(350);
            if (keys.W.isDown || cursors.up.isDown) player.body.setVelocityY(-350);
            else if (keys.S.isDown || cursors.down.isDown) player.body.setVelocityY(350);

            if (Phaser.Input.Keyboard.JustDown(keys.SPACE) && superCharge >= 10) {
                lanzarSuper(this);
            }

            let dP = Phaser.Math.Distance.Between(player.x, player.y, CX, CY);
            let aP = Phaser.Math.Angle.WrapDegrees(Phaser.Math.RadToDeg(Phaser.Math.Angle.Between(CX, CY, player.x, player.y)));
            rings.forEach(r => {
                if (Math.abs(dP - r.r) < 15) {
                    let diff = Math.abs(aP - r.g);
                    if (diff > 180) diff = 360 - diff;
                    if (diff > 35) {
                        let push = (dP > r.r) ? 20 : -20;
                        let rad = Phaser.Math.DegToRad(aP);
                        player.x = CX + Math.cos(rad) * (r.r + push);
                        player.y = CY + Math.sin(rad) * (r.r + push);
                    }
                }
            });

            if (virus && time > lastVShot + 1200) {
                lastVShot = time;
                let vb = this.add.circle(CX, CY, 8, 0xff003c);
                let ang = Phaser.Math.Angle.Between(CX, CY, player.x, player.y);
                vb.vx = Math.cos(ang) * 8; vb.vy = Math.sin(ang) * 8;
                vBullets.push(vb);
            }
            if(virus) virus.rotation += 0.04;

            pBullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (virus && Phaser.Math.Distance.Between(b.x, b.y, CX, CY) < 40) {
                    b.destroy(); pBullets.splice(i, 1);
                    virusHP--;
                    showDamage(this, CX + (Math.random()*60-30), CY, "-1", "#00e5ff", false);
                    vHealthBar.width = (virusHP / 50) * 60;
                    if (superCharge < 10) {
                        superCharge++;
                        if(superCharge >= 10) document.getElementById('super-hint').style.display = 'inline';
                    }
                    if (virusHP <= 0) ganar();
                }
            });

            vBullets.forEach((vb, j) => {
                vb.x += vb.vx; vb.y += vb.vy;
                if (Phaser.Math.Distance.Between(vb.x, vb.y, player.x, player.y) < 22) {
                    playerHP -= 10;
                    document.getElementById('hpText').innerText = Math.floor(playerHP);
                    vb.destroy(); vBullets.splice(j, 1);
                    if (playerHP <= 0) location.reload();
                }
            });

            pHealthBar.setPosition(player.x, player.y - 30).width = (playerHP/60)*40;
            superBar.setPosition(player.x, player.y - 25).width = (superCharge/10)*40;
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 15 + (i*15), player.y - 18);
                ammoBars[i].visible = (i < ammo);
            }
            if (time > nextAmmo && ammo < 3) { ammo++; nextAmmo = time + 1000; }
        }

        function lanzarSuper(scene) {
            superCharge = 0;
            document.getElementById('super-hint').style.display = 'none';
            let onda = scene.add.circle(player.x, player.y, 10, 0xff00ff, 0.4).setDepth(1);
            
            if (virus && Phaser.Math.Distance.Between(player.x, player.y, CX, CY) < 600) {
                virusHP -= 5;
                showDamage(scene, CX, CY, "-5", "#ff00ff", true); 
                vHealthBar.width = Math.max(0, (virusHP / 50) * 60);
                if (virusHP <= 0) ganar();
            }

            vBullets.forEach((vb) => { if (Phaser.Math.Distance.Between(player.x, player.y, vb.x, vb.y) < 500) vb.destroy(); });
            vBullets = vBullets.filter(vb => vb.active);

            scene.tweens.add({ targets: onda, radius: 600, alpha: 0, duration: 600, onComplete: () => onda.destroy() });
        }

        function ganar() {
            gameEnded = true;
            if (virus) { virus.destroy(); vHealthBar.destroy(); vHealthBG.destroy(); }
            document.getElementById('super-hint').innerText = "¡SISTEMA PURGADO! VICTORIA";
            document.getElementById('super-hint').style.display = 'block';
        }
    </script>
</body>
</html>
