<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLITCH ARENA - Muros Organizados</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #ff003c; box-shadow: 0 0 20px #ff003c; margin-top: 10px; }
        .ui-container { text-align: center; pointer-events: none; margin-top: 10px; }
        #superReady { color: #00e5ff; font-weight: bold; visibility: hidden; text-shadow: 0 0 8px #00e5ff; }
    </style>
</head>
<body>
    <div class="ui-container">
        <h1 style="margin:0;">[ GLITCH ARENA ]</h1>
        <p style="margin:5px;">Súper: <span id="sCount">0</span>/5 | <span id="superReady">¡PRESIONA ESPACIO!</span></p>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, spaceKey, wasd, balas, bloques, viruses, pulseRing;
        let playerHP = 100, playerAmmo = 3, kills = 0, lastReload = 0;
        let isGameOver = false, superReady = false;
        let healthBar, ammoBars = [];

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            this.cameras.main.setBounds(0, 0, 1600, 1200);

            balas = this.physics.add.group();
            bloques = this.physics.add.staticGroup();
            viruses = this.physics.add.group();

            // --- GENERACIÓN DE MUROS EN HILERAS ---
            const wallSize = 40; // Muros más pequeños
            const numGrupos = 35; // Cuántas "hileras" queremos

            for (let i = 0; i < numGrupos; i++) {
                // Punto de origen aleatorio (evitando el spawn del jugador)
                let startX = Phaser.Math.Between(300, 1500);
                let startY = Phaser.Math.Between(300, 1100);
                
                let esHorizontal = Phaser.Math.Between(0, 1);
                let largoHilera = Phaser.Math.Between(3, 4);

                for (let j = 0; j < largoHilera; j++) {
                    let posX = esHorizontal ? startX + (j * wallSize) : startX;
                    let posY = esHorizontal ? startY : startY + (j * wallSize);

                    // Evitar que se salgan del mundo
                    if (posX < 1550 && posY < 1150) {
                        let visual = this.add.rectangle(posX, posY, wallSize, wallSize, 0x1a1a1a)
                                         .setStrokeStyle(2, 0x00ff41).setDepth(1);
                        let b = bloques.create(posX, posY, null).setSize(wallSize, wallSize).refreshBody();
                        b.setData('visual', visual);
                    }
                }
            }

            // Jugador
            player = this.add.rectangle(100, 100, 25, 25, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // UI (Vida y Munición)
            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(11);
            for(let i=0; i<3; i++) ammoBars[i] = this.add.rectangle(0, 0, 10, 3, 0x00e5ff).setDepth(11);
            pulseRing = this.add.circle(0, 0, 10, 0x00e5ff, 0.4).setVisible(false).setDepth(5);

            // Colisiones y Eventos
            this.physics.add.collider(player, bloques);
            this.physics.add.collider(viruses, bloques);
            this.physics.add.collider(balas, bloques, (b) => { 
                if(b.getData('r')) b.getData('r').destroy(); 
                b.destroy(); 
            });

            this.physics.add.collider(balas, viruses, (bala, virus) => {
                if(virus.getData('visual')) virus.getData('visual').destroy();
                virus.destroy();
                if(bala.getData('r')) bala.getData('r').destroy();
                bala.destroy();
                updateKills();
            });

            this.physics.add.overlap(player, viruses, (p, v) => {
                playerHP -= 20;
                if(v.getData('visual')) v.getData('visual').destroy();
                v.destroy();
                if(playerHP <= 0) location.reload();
            });

            wasd = this.input.keyboard.addKeys('W,A,S,D');
            spaceKey = this.input.keyboard.addKey('SPACE');

            this.input.on('pointerdown', (pointer) => {
                if(playerAmmo > 0) {
                    playerAmmo--;
                    let p = pointer.positionToCamera(this.cameras.main);
                    let r = this.add.rectangle(player.x, player.y, 8, 8, 0x00e5ff).setDepth(5);
                    let b = balas.create(player.x, player.y, null).setSize(8, 8);
                    b.setData('r', r);
                    this.physics.moveTo(b, p.x, p.y, 600);
                }
            });

            this.time.addEvent({ delay: 2000, callback: spawnVirus, callbackScope: this, loop: true });
        }

        function spawnVirus() {
            let x = Phaser.Math.Between(400, 1500), y = Phaser.Math.Between(400, 1100);
            let vVis = this.add.rectangle(x, y, 22, 22, 0xff003c).setDepth(5);
            let v = viruses.create(x, y, null).setSize(22, 22);
            v.setData('visual', vVis);
        }

        function updateKills() {
            if(!superReady) {
                kills++;
                document.getElementById('sCount').innerText = kills;
                if(kills >= 5) {
                    superReady = true;
                    document.getElementById('superReady').style.visibility = 'visible';
                }
            }
        }

        function update(time) {
            player.body.setVelocity(0);
            let s = 300; // Un poco más rápido para libertad de movimiento
            if (wasd.A.isDown) player.body.setVelocityX(-s);
            else if (wasd.D.isDown) player.body.setVelocityX(s);
            if (wasd.W.isDown) player.body.setVelocityY(-s);
            else if (wasd.S.isDown) player.body.setVelocityY(s);

            if (Phaser.Input.Keyboard.JustDown(spaceKey) && superReady) {
                superReady = false; kills = 0;
                document.getElementById('sCount').innerText = "0";
                document.getElementById('superReady').style.visibility = 'hidden';
                pulseRing.setPosition(player.x, player.y).setVisible(true).setRadius(10).setAlpha(0.6);
                this.tweens.add({ targets: pulseRing, radius: 250, alpha: 0, duration: 400, onComplete: () => pulseRing.setVisible(false) });
                viruses.getChildren().forEach(v => {
                    if(Phaser.Math.Distance.Between(player.x, player.y, v.x, v.y) < 250) {
                        let ang = Phaser.Math.Angle.Between(player.x, player.y, v.x, v.y);
                        v.body.setVelocity(Math.cos(ang)*1200, Math.sin(ang)*1200);
                        v.setData('st', true);
                        this.time.delayedCall(800, () => { if(v.active) v.setData('st', false); });
                    }
                });
            }

            if (playerAmmo < 3 && time > lastReload + 1200) { playerAmmo++; lastReload = time; }
            healthBar.setPosition(player.x, player.y - 35).width = Math.max(0, (playerHP/100)*40);
            for(let i=0; i<3; i++) {
                ammoBars[i].setPosition(player.x - 14 + (i*14), player.y - 25);
                ammoBars[i].visible = (i < playerAmmo);
            }
            balas.getChildren().forEach(b => { if(b.getData('r')) { b.getData('r').x = b.x; b.getData('r').y = b.y; } });
            viruses.getChildren().forEach(v => {
                if(!v.getData('st')) this.physics.moveToObject(v, player, 140);
                if(v.getData('visual')) { v.getData('visual').x = v.x; v.getData('visual').y = v.y; }
            });
        }
    </script>
</body>
</html>
