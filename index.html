<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLITCH ARENA - Súper Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; color: #00ff41; font-family: monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { border: 2px solid #ff003c; box-shadow: 0 0 20px #ff003c; margin-top: 20px; }
        .ui-text { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); pointer-events: none; text-align: center; z-index: 100; }
        #superStatus { color: #00e5ff; font-weight: bold; display: none; text-shadow: 0 0 10px #00e5ff; }
        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #ff003c; font-size: 3rem; text-align: center; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        button { background: #ff003c; color: white; padding: 10px 20px; border: none; cursor: pointer; font-family: monospace; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="ui-text">
        <h1>[ GLITCH ARENA ]</h1>
        <p>Carga el SÚPER: <span id="virusCountText">0</span>/5</p>
        <div id="superStatus">¡SÚPER LISTO! (ESPACIO)</div>
    </div>

    <div id="gameOverScreen" class="game-over-screen">
        <p>SISTEMA CAÍDO</p>
        <button onclick="window.location.reload()">REINICIAR</button>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 450,
            backgroundColor: '#0a0a0a',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, wasd, spaceKey, cursors, balas, bloques, viruses, pulseRing;
        let healthBar, ammoBars = [];
        let playerHP = 100, playerAmmo = 3, lastReload = 0, killsForSuper = 0, gameOver = false, superReady = false;

        function preload() {}

        function create() {
            this.physics.world.setBounds(0, 0, 1600, 1200);
            this.cameras.main.setBounds(0, 0, 1600, 1200);

            balas = this.physics.add.group();
            bloques = this.physics.add.staticGroup();
            viruses = this.physics.add.group();

            // Laberinto mejorado
            const tileSize = 80;
            const wallSize = 60; 
            for (let x = 0; x < 1600; x += tileSize) {
                for (let y = 0; y < 1200; y += tileSize) {
                    if (x < 240 && y < 240) continue;
                    if (Phaser.Math.Between(0, 10) > 7) { 
                        let visual = this.add.rectangle(x + 40, y + 40, wallSize, wallSize, 0x1a1a1a).setStrokeStyle(2, 0x00ff41).setDepth(1);
                        let b = bloques.create(x + 40, y + 40, null);
                        b.body.setSize(wallSize, wallSize);
                        b.refreshBody();
                        b.setData('visual', visual);
                    }
                }
            }

            // Jugador
            player = this.add.rectangle(120, 120, 30, 30, 0x00ff41).setDepth(10);
            this.physics.add.existing(player);
            player.body.setCollideWorldBounds(true);
            this.cameras.main.startFollow(player, true, 0.1, 0.1);

            // UI
            healthBar = this.add.rectangle(0, 0, 40, 5, 0x00ff00).setDepth(11);
            for(let i=0; i<3; i++) { ammoBars[i] = this.add.rectangle(0, 0, 10, 3, 0x00e5ff).setDepth(11); }

            // Anillo del Súper
            pulseRing = this.add.circle(0, 0, 10, 0x00e5ff, 0.4).setDepth(5).setVisible(false);

            this.time.addEvent({ delay: 2000, callback: spawnVirus, callbackScope: this, loop: true });
            
            this.physics.add.collider(player, bloques);
            this.physics.add.collider(viruses, bloques);
            this.physics.add.collider(balas, bloques, (b) => { if(b.getData('rect')) b.getData('rect').destroy(); b.destroy(); });

            this.physics.add.collider(balas, viruses, (bala, virus) => {
                if(virus.getData('visual')) virus.getData('visual').destroy();
                virus.destroy();
                if(bala.getData('rect')) bala.getData('rect').destroy();
                bala.destroy();
                
                if(!superReady) {
